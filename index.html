<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Empty data-URI icon avoids a 404 favicon request. Replace with real art later. -->
    <link rel="icon" href="data:," />
    <title>Lumio's Leap</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1117;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* Center the canvas and let Phaser's Scale.FIT manage its size. */
      #game-root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-root canvas {
        image-rendering: pixelated; /* crisp pixel art, no blur */
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
